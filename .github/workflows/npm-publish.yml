name: Publish release

on:
  release:
    types:
      - published

jobs:
  version-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Get and validate version number
        uses: nationalarchives/github-actions/.github/actions/validate-node-package-version@fixes # zizmor: ignore[unpinned-uses] Owned by The National Archives

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - version-check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test

  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: npm
      url: https://www.npmjs.com/package/@nationalarchives/eslint-config
    needs:
      - tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/krypton
          registry-url: https://registry.npmjs.org/
          scope: "@nationalarchives"
      - name: Publish to npm
        run: npm publish
